name: CI

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]
  push:
    branches:
      - main

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

jobs:
  benchmark:
    name: Benchmark
    runs-on: ubuntu-latest
    permissions:
      contents: write # Push the auto/update-readme branch.
      pull-requests: write # Create and auto-merge the README PR.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: oxc-project/setup-node@4c588e9266bd930b6ddc34307df0659ed511d187 # v1.3.1

      - run: pnpm run bench

      - name: Update README with benchmark results
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pnpm run bench:update-readme

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: app-token
        with:
          client-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        id: cpr
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: auto/update-readme
          delete-branch: true
          base: main
          title: "chore: update benchmark results in README"
          commit-message: |
            chore: update benchmark results in README

            [skip ci]
          body: Automated benchmark results update triggered by a change to `main`.
          add-paths: README.md

      - uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3
        if: steps.cpr.outputs.pull-request-number
        with:
          token: ${{ steps.app-token.outputs.token }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
